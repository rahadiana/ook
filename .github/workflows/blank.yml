name: Bun Opencode Test

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Verify Bun
        run: bun --version

      # Install opencode (global)
      - name: Install opencode
        run: |
          bun install -g opencode-ai
          sleep 5
        
      - name: Verify opencode
        run: opencode --help

      # Contoh eksekusi
      - name: Run opencode test
        run: |
          opencode -m opencode/qwen3.6-plus
          opencode run "console.log('Hello from opencode')"
